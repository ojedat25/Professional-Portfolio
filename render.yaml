services:
  - type: web
    name: portfolio-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: |
      pip install -r ../requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn portfolio.wsgi:application
    healthCheckPath: /api/periodic_tasks/ping/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
