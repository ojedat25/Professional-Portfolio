services:
  - type: web
    name: portfolio-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: |
      pip install -r ../requirements.txt
      python manage.py migrate
    startCommand: gunicorn portfolio.wsgi:application
    healthCheckPath: /api/periodic_tasks/ping/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: portfolio-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    domains:
      - dev-toni.me
      - www.dev-toni.me
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        value: https://portfolio-backend-bi4d.onrender.com/api
